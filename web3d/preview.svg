<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Left Avatar (User) -->
  <g>
    <!-- Glow effect -->
    <circle cx="200" cy="300" r="100" fill="#00ffff" opacity="0.15" filter="blur(20px)"/>

    <!-- Head -->
    <circle cx="200" cy="240" r="45" fill="#00ffff" stroke="#00ffff" stroke-width="2"/>

    <!-- Eyes -->
    <circle cx="185" cy="230" r="6" fill="#000"/>
    <circle cx="215" cy="230" r="6" fill="#000"/>

    <!-- Mouth -->
    <path d="M 190 250 Q 200 255 210 250" stroke="#ff00ff" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <rect x="170" y="290" width="60" height="80" rx="10" fill="#0080ff" opacity="0.8"/>

    <!-- Arms -->
    <line x1="170" y1="310" x2="130" y2="320" stroke="#00ffff" stroke-width="8" stroke-linecap="round"/>
    <line x1="230" y1="310" x2="270" y2="320" stroke="#00ffff" stroke-width="8" stroke-linecap="round"/>

    <!-- Label -->
    <text x="200" y="400" font-size="16" font-weight="bold" text-anchor="middle" fill="#00ffff">VOCÊ</text>
  </g>

  <!-- Right Avatar (Bot) -->
  <g>
    <!-- Glow effect -->
    <circle cx="1000" cy="300" r="100" fill="#ff00ff" opacity="0.15" filter="blur(20px)"/>

    <!-- Head -->
    <circle cx="1000" cy="240" r="45" fill="#ff00ff" stroke="#ff00ff" stroke-width="2"/>

    <!-- Eyes -->
    <circle cx="985" cy="230" r="6" fill="#000"/>
    <circle cx="1015" cy="230" r="6" fill="#000"/>

    <!-- Antennae -->
    <line x1="980" y1="195" x2="970" y2="150" stroke="#ff00ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="1020" y1="195" x2="1030" y2="150" stroke="#ff00ff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="970" cy="150" r="4" fill="#ff00ff"/>
    <circle cx="1030" cy="150" r="4" fill="#ff00ff"/>

    <!-- Talking mouth (animated) -->
    <ellipse cx="1000" cy="255" rx="8" ry="12" fill="#ff00ff" opacity="0.8"/>

    <!-- Body -->
    <rect x="970" y="290" width="60" height="80" rx="10" fill="#ff0080" opacity="0.8"/>

    <!-- Robot arms (lines) -->
    <line x1="970" y1="310" x2="930" y2="320" stroke="#ff00ff" stroke-width="8" stroke-linecap="round"/>
    <line x1="1030" y1="310" x2="1070" y2="320" stroke="#ff00ff" stroke-width="8" stroke-linecap="round"/>

    <!-- Label -->
    <text x="1000" y="400" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff00ff">AXOLOTL-BYTE</text>
  </g>

  <!-- Center Chat Bubble -->
  <g>
    <!-- Chat bubble background -->
    <rect x="400" y="150" width="400" height="120" rx="15" fill="rgba(0, 255, 255, 0.15)" stroke="#00ffff" stroke-width="2"/>

    <!-- Chat bubble pointer -->
    <polygon points="600,270 620,310 580,310" fill="rgba(0, 255, 255, 0.15)" stroke="#00ffff" stroke-width="2"/>

    <!-- Chat text -->
    <text x="600" y="180" font-size="14" text-anchor="middle" fill="#00ffff" font-weight="bold">Olá! Sou o Axolotl-Byte</text>
    <text x="600" y="210" font-size="12" text-anchor="middle" fill="#00ffff" opacity="0.9">Interface 3D com avatares animados,</text>
    <text x="600" y="235" font-size="12" text-anchor="middle" fill="#00ffff" opacity="0.9">múltiplas cenas e reprodutor de música!</text>
  </g>

  <!-- Top UI Bar -->
  <g>
    <!-- Background bar -->
    <rect x="50" y="30" width="1100" height="50" rx="8" fill="rgba(10, 10, 30, 0.9)" stroke="#00ffff" stroke-width="2"/>

    <!-- Status indicator -->
    <circle cx="80" cy="55" r="5" fill="#00ff00" opacity="0.8"/>
    <circle cx="80" cy="55" r="5" fill="#00ff00" opacity="0.3" r="8"/>

    <!-- Title -->
    <text x="100" y="60" font-size="16" font-weight="bold" fill="#00ffff">Axolotl-Byte 3D</text>
    <text x="1050" y="60" font-size="11" fill="#00ffff" opacity="0.7" text-anchor="end">Online</text>
  </g>

  <!-- Bottom Input Bar -->
  <g>
    <!-- Background -->
    <rect x="50" y="500" width="1100" height="50" rx="8" fill="rgba(10, 10, 30, 0.9)" stroke="#00ffff" stroke-width="2"/>

    <!-- Input field -->
    <rect x="60" y="510" width="950" height="30" rx="6" fill="rgba(15, 10, 30, 0.8)" stroke="#00ffff" stroke-width="1.5"/>
    <text x="80" y="535" font-size="12" fill="rgba(0, 255, 255, 0.5)">Digite um comando (!ia, !musica, !ranking...)</text>

    <!-- Send button -->
    <rect x="1020" y="510" width="50" height="30" rx="6" fill="rgba(0, 255, 255, 0.2)" stroke="#00ffff" stroke-width="1.5"/>
    <text x="1045" y="532" font-size="16" text-anchor="middle" fill="#00ffff">▶</text>
  </g>

  <!-- Scene buttons -->
  <g>
    <rect x="60" y="100" width="130" height="35" rx="6" fill="rgba(255, 0, 255, 0.3)" stroke="#ff00ff" stroke-width="2"/>
    <text x="125" y="125" font-size="11" text-anchor="middle" fill="#ff00ff" font-weight="bold">Sala de Chat</text>

    <rect x="200" y="100" width="130" height="35" rx="6" fill="rgba(0, 255, 255, 0.1)" stroke="#00ffff" stroke-width="1"/>
    <text x="265" y="125" font-size="11" text-anchor="middle" fill="#00ffff">Estúdio Música</text>

    <rect x="340" y="100" width="130" height="35" rx="6" fill="rgba(0, 255, 255, 0.1)" stroke="#00ffff" stroke-width="1"/>
    <text x="405" y="125" font-size="11" text-anchor="middle" fill="#00ffff">Cyberspace</text>
  </g>

  <!-- Music Player widget (right side) -->
  <g>
    <!-- Background -->
    <rect x="1050" y="100" width="120" height="140" rx="8" fill="rgba(10, 10, 30, 0.95)" stroke="#ff00ff" stroke-width="2"/>

    <!-- Title -->
    <text x="1110" y="125" font-size="11" text-anchor="middle" fill="#ff00ff" font-weight="bold">🎵 Música</text>

    <!-- Visualizer bars -->
    <rect x="1065" y="145" width="4" height="25" fill="#ff00ff" opacity="0.8"/>
    <rect x="1075" y="140" width="4" height="30" fill="#00ffff" opacity="0.8"/>
    <rect x="1085" y="148" width="4" height="22" fill="#ff00ff" opacity="0.8"/>
    <rect x="1095" y="142" width="4" height="28" fill="#00ffff" opacity="0.8"/>
    <rect x="1105" y="150" width="4" height="20" fill="#ff00ff" opacity="0.8"/>
    <rect x="1115" y="138" width="4" height="32" fill="#00ffff" opacity="0.8"/>

    <!-- Controls -->
    <circle cx="1080" cy="200" r="6" fill="#ff00ff" opacity="0.7"/>
    <text x="1080" y="203" font-size="10" text-anchor="middle" fill="#000">⏯</text>

    <circle cx="1110" cy="200" r="6" fill="#ff00ff" opacity="0.7"/>
    <text x="1110" y="203" font-size="10" text-anchor="middle" fill="#000">⏹</text>
  </g>

  <!-- Bottom gradient overlay -->
  <defs>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#fadeBottom)"/>

  <!-- Neon glow text at bottom -->
  <text x="600" y="580" font-size="18" text-anchor="middle" fill="url(#neonGrad)" font-weight="bold" opacity="0.8">THREE.JS • WEBSOCKET • NODE.JS</text>
</svg>
