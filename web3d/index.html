<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axolotl-Byte 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            flex: 1;
            overflow: hidden;
        }
        .panel {
            background: rgba(30, 20, 60, 0.8);
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            border: 3px solid;
            animation: float 3s ease-in-out infinite;
        }
        .avatar.bot { border-color: #ff00ff; color: #ff00ff; }
        .avatar.user { border-color: #00ffff; color: #00ffff; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            background: rgba(15, 10, 30, 0.5);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            animation: slideIn 0.3s ease-out;
        }
        .message.bot {
            background: rgba(0, 255, 255, 0.2);
            border-left: 3px solid #00ffff;
        }
        .message.user {
            background: rgba(255, 0, 255, 0.2);
            border-left: 3px solid #ff00ff;
            margin-left: 20%;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 2px solid #00ffff;
            background: rgba(15, 10, 30, 0.8);
            color: #00ffff;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus { outline: none; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
        button {
            padding: 10px 20px;
            border: 2px solid #00ffff;
            background: transparent;
            color: #00ffff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: rgba(0, 255, 255, 0.2); }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ffff;
        }
        h1 {
            text-align: center;
            color: #00ffff;
            padding: 10px;
            text-shadow: 0 0 20px #00ffff;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 255, 255, 0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.4); }
    </style>
</head>
<body>
    <h1>🤖 AXOLOTL-BYTE 3D</h1>
    <div class="container">
        <div class="panel">
            <div class="title">👤 Você</div>
            <div class="avatar user">😊</div>
            <p style="text-align: center; opacity: 0.8;">Online</p>
        </div>

        <div class="panel">
            <div class="title">💬 Chat</div>
            <div class="chat">
                <div class="messages" id="messages"></div>
                <div class="input-group">
                    <input type="text" id="input" placeholder="Digite um comando...">
                    <button onclick="enviar()">Enviar</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="title">🤖 Bot</div>
            <div class="avatar bot">🦎</div>
            <p style="text-align: center; opacity: 0.8;">Conectado</p>
        </div>

        <div class="panel">
            <div class="title">⌨️ Comandos</div>
            <div style="overflow-y: auto; flex: 1;">
                <button onclick="enviarCmd('!ia Olá')" style="width: 100%; margin-bottom: 5px; text-align: left;">!ia - Chat com IA</button>
                <button onclick="enviarCmd('!ranking')" style="width: 100%; margin-bottom: 5px; text-align: left;">!ranking - Top 5</button>
                <button onclick="enviarCmd('!perfil')" style="width: 100%; margin-bottom: 5px; text-align: left;">!perfil - Seu perfil</button>
                <button onclick="enviarCmd('!jornal')" style="width: 100%; margin-bottom: 5px; text-align: left;">!jornal - Resumo</button>
                <button onclick="enviarCmd('!stats')" style="width: 100%; margin-bottom: 5px; text-align: left;">!stats - Estatísticas</button>
                <button onclick="enviarCmd('!voz')" style="width: 100%; margin-bottom: 5px; text-align: left;">!voz - Efeitos</button>
                <button onclick="enviarCmd('!musica')" style="width: 100%; margin-bottom: 5px; text-align: left;">!musica - Reprodutor</button>
                <button onclick="enviarCmd('!sumidos')" style="width: 100%; margin-bottom: 5px; text-align: left;">!sumidos - Inativos</button>
                <button onclick="enviarCmd('!ajuda')" style="width: 100%; margin-bottom: 5px; text-align: left;">!ajuda - Todos</button>
            </div>
        </div>
    </div>

    <script>
        const comandos = {
            '!ia': '🧠 IA: Olá! Como posso ajudar?',
            '!ranking': '🏆 TOP 5:\n1. EndriaCarem - 5000 XP\n2. Dev Master - 4500 XP\n3. Code Ninja - 4000 XP\n4. Tech Wizard - 3500 XP\n5. Bot Lover - 3000 XP',
            '!perfil': '👤 Nível: 25 | XP: 2500 | Rank: 12º | Mensagens: 342',
            '!jornal': '📰 15 mensagens | 3 enquetes | Top: EndriaCarem 850 XP',
            '!stats': '📊 Membros: 24 | Mensagens: 12.450 | Uptime: 45 dias',
            '!voz': '🎙️ !demonio !esquilo !robo !estadio !agudo !grave',
            '!sumidos': '🚫 João (12d) | Maria (9d) | Pedro (8d)',
            '!musica': '🎵 Reprodutor ativado! 🎶',
            '!ajuda': '❓ Comandos: !ia !ranking !perfil !jornal !stats !voz !musica !sumidos'
        };

        function addMsg(text, tipo) {
            const msg = document.createElement('div');
            msg.className = `message ${tipo}`;
            msg.textContent = text;
            document.getElementById('messages').appendChild(msg);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function processarCmd(cmd) {
            const lower = cmd.toLowerCase().trim();

            for (let [key, resp] of Object.entries(comandos)) {
                if (lower.startsWith(key)) {
                    return resp;
                }
            }

            if (lower.startsWith('!ia ')) {
                return `🤖 Respondendo: "${lower.substring(4)}"`;
            }

            return '❓ Comando desconhecido. Digite !ajuda';
        }

        function enviarCmd(cmd) {
            document.getElementById('input').value = cmd;
            enviar();
        }

        function enviar() {
            const input = document.getElementById('input');
            const cmd = input.value.trim();

            if (!cmd) return;

            addMsg(cmd, 'user');
            const resp = processarCmd(cmd);
            addMsg(resp, 'bot');
            input.value = '';
            input.focus();
        }

        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviar();
        });

        // Mensagem inicial
        setTimeout(() => {
            addMsg('Olá! 👋 Sou o Axolotl-Byte. Digite um comando ou clique nos botões!', 'bot');
        }, 500);
    </script>
</body>
</html>
