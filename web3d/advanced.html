<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axolotl-Byte 3D — Interface Avançada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: all;
            background: rgba(10, 10, 30, 0.9);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            max-width: 800px;
        }

        .status-info {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 12px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .bottom-panel {
            pointer-events: all;
            display: flex;
            gap: 15px;
            max-width: 600px;
            align-self: flex-end;
        }

        .input-group {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #00ffff;
            background: rgba(10, 10, 30, 0.9);
            color: #00ffff;
            border-radius: 6px;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        input[type="text"]::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }

        button {
            padding: 10px 20px;
            border: 2px solid #00ffff;
            background: transparent;
            color: #00ffff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }

        button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .scene-selector {
            display: flex;
            gap: 10px;
            pointer-events: all;
            flex-wrap: wrap;
            max-width: 600px;
        }

        .scene-btn {
            padding: 8px 16px;
            font-size: 11px;
            background: rgba(255, 0, 255, 0.1);
            border-color: #ff00ff;
            color: #ff00ff;
            transition: all 0.2s;
        }

        .scene-btn.active {
            background: rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
        }

        .scene-btn:hover {
            background: rgba(255, 0, 255, 0.2);
        }

        .music-player {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(10, 10, 30, 0.95);
            border: 2px solid #ff00ff;
            border-radius: 10px;
            padding: 15px;
            width: 280px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
            backdrop-filter: blur(10px);
            pointer-events: all;
            display: none;
            z-index: 100;
        }

        .music-player.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .music-title {
            font-size: 12px;
            font-weight: bold;
            color: #ff00ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 60px;
            margin-bottom: 10px;
        }

        .bar {
            width: 4px;
            background: linear-gradient(180deg, #00ffff, #ff00ff);
            border-radius: 2px;
            animation: dance 0.3s ease-in-out;
        }

        @keyframes dance {
            0%, 100% { height: 10%; }
            50% { height: 100%; }
        }

        .music-controls {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .music-controls button {
            padding: 6px 12px;
            font-size: 10px;
        }

        .chat-bubble {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 12px 20px;
            max-width: 400px;
            font-size: 14px;
            pointer-events: none;
            animation: appear 0.3s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .loading-text {
            display: none;
            text-align: center;
            color: #00ffff;
            font-size: 12px;
            animation: blink 0.7s infinite;
        }

        .loading-text.active {
            display: block;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .scene-info {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(10, 10, 30, 0.9);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 15px;
            font-size: 11px;
            max-width: 200px;
            pointer-events: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui-overlay">
        <div>
            <div class="top-bar" style="margin-bottom: 15px;">
                <div class="status-info">
                    <div class="status-dot"></div>
                    <span>Axolotl-Byte 3D</span>
                    <span id="statusText">Carregando cena...</span>
                </div>
            </div>

            <div class="scene-selector" id="sceneSelector"></div>
        </div>

        <div style="display: flex; justify-content: space-between; width: 100%;">
            <div class="bottom-panel">
                <div class="input-group">
                    <input
                        type="text"
                        id="commandInput"
                        placeholder="Digite um comando (!ia, !musica, !ranking...)"
                        autocomplete="off"
                    >
                    <button id="sendBtn">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="music-player" id="musicPlayer">
        <div class="music-title">🎵 Tocando agora</div>
        <div class="visualizer" id="visualizer"></div>
        <div class="music-controls">
            <button onclick="musicPlayer.toggle()">⏯</button>
            <button onclick="musicPlayer.stop()">⏹</button>
        </div>
    </div>

    <div class="chat-bubble" id="chatBubble" style="display: none;"></div>
    <div class="scene-info" id="sceneInfo"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@r128/build/three.module.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@r128/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@r128/examples/jsm/controls/OrbitControls.js';

        // ========== CONFIG ==========
        // Detecta ambiente (produção vs local)
        const isDev = window.location.hostname === 'localhost';
        const API_URL = isDev
            ? 'http://localhost:3001/api/command'
            : '/api/command';

        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setClearColor(0x0a0a1e);

        const controls = new OrbitControls(camera, canvas);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2;

        // ========== CENAS ==========
        const scenes = {
            sala: {
                name: 'Sala de Chat',
                setup: setupSala,
                camera: { x: 0, y: 1.5, z: 4 }
            },
            estudio: {
                name: 'Estúdio de Música',
                setup: setupEstudio,
                camera: { x: 0, y: 2, z: 6 }
            },
            cyberspace: {
                name: 'Cyberspace',
                setup: setupCyberspace,
                camera: { x: 0, y: 2, z: 5 }
            }
        };

        let currentScene = 'sala';
        let avatarBot = null;
        let avatarUser = null;

        function loadScene(sceneKey) {
            scene.clear();
            currentScene = sceneKey;
            scenes[sceneKey].setup();
            updateCameraPosition(scenes[sceneKey].camera);
            document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-scene="${sceneKey}"]`).classList.add('active');
            updateSceneInfo();
        }

        function updateCameraPosition(pos) {
            camera.position.set(pos.x, pos.y, pos.z);
            camera.lookAt(0, 1, 0);
        }

        // ========== SETUP CENAS ==========
        function setupSala() {
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            light.castShadow = true;
            scene.add(light);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            const geometry = new THREE.PlaneGeometry(10, 10);
            const material = new THREE.MeshStandardMaterial({ color: 0x1a1a3a });
            const floor = new THREE.Mesh(geometry, material);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            createAvatar('bot', { x: -2, y: 0, z: 0 });
            createAvatar('user', { x: 2, y: 0, z: 0 });

            const back = new THREE.Mesh(
                new THREE.PlaneGeometry(10, 6),
                new THREE.MeshStandardMaterial({ color: 0x0f0a2e })
            );
            back.position.z = -5;
            back.position.y = 3;
            scene.add(back);
        }

        function setupEstudio() {
            const light = new THREE.DirectionalLight(0xff00ff, 1);
            light.position.set(0, 10, 0);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xff00ff, 0.3));

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(15, 15),
                new THREE.MeshStandardMaterial({ color: 0x2a0a4a })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            createAvatar('bot', { x: 0, y: 0, z: 0 });
            createAvatar('user', { x: -3, y: 0, z: 0 });

            // Instrumentos decorativos
            const mic = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.2, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xff00ff, metalness: 0.8 })
            );
            mic.position.set(2, 0.75, 0);
            scene.add(mic);
        }

        function setupCyberspace() {
            const light = new THREE.PointLight(0x00ffff, 1);
            light.position.set(0, 5, 5);
            scene.add(light);

            scene.add(new THREE.AmbientLight(0x00ffff, 0.5));

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({
                    color: 0x001a33,
                    emissive: 0x001a33
                })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Grid de neon
            const gridHelper = new THREE.GridHelper(20, 20, 0x00ffff, 0x0088ff);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);

            createAvatar('bot', { x: 0, y: 0, z: 0 });
            createAvatar('user', { x: 3, y: 0, z: 0 });
        }

        function createAvatar(type, position) {
            const group = new THREE.Group();

            // Cabeça
            const headGeometry = new THREE.SphereGeometry(0.4, 32, 32);
            const headMaterial = new THREE.MeshStandardMaterial({
                color: type === 'bot' ? 0xff00ff : 0x00ffff,
                metalness: 0.6,
                roughness: 0.4
            });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 1.5;
            group.add(head);

            // Corpo
            const bodyGeometry = new THREE.BoxGeometry(0.3, 0.8, 0.2);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: type === 'bot' ? 0xff0080 : 0x0080ff
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.8;
            group.add(body);

            // Olhos
            const eyeGeometry = new THREE.SphereGeometry(0.08, 16, 16);
            const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(-0.12, 1.7, 0.35);
            group.add(leftEye);

            const rightEye = leftEye.clone();
            rightEye.position.x = 0.12;
            group.add(rightEye);

            // Boca (para animação)
            group.mouth = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.1, 0.05),
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            group.mouth.position.set(0, 1.3, 0.38);
            group.add(group.mouth);

            group.position.set(position.x, position.y, position.z);
            group.castShadow = true;
            scene.add(group);

            if (type === 'bot') avatarBot = group;
            else avatarUser = group;
        }

        function animateAvatar(avatar, duration = 1) {
            if (!avatar || !avatar.mouth) return;

            const originalScale = avatar.mouth.scale.y;
            let elapsed = 0;

            const animate = () => {
                elapsed += 0.016;
                const progress = elapsed / duration;

                if (progress < 0.3) {
                    avatar.mouth.scale.y = originalScale + (progress / 0.3) * 0.3;
                } else if (progress < 0.7) {
                    avatar.mouth.scale.y = originalScale + 0.3;
                } else {
                    avatar.mouth.scale.y = originalScale + (1 - (progress - 0.7) / 0.3) * 0.3;
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    avatar.mouth.scale.y = originalScale;
                }
            };

            animate();
        }

        // ========== UI ==========
        const commandInput = document.getElementById('commandInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatBubble = document.getElementById('chatBubble');
        const sceneSelector = document.getElementById('sceneSelector');
        const sceneInfo = document.getElementById('sceneInfo');

        // ========== API CONFIG ==========
        console.log(`🌐 API URL: ${API_URL}`);

        Object.entries(scenes).forEach(([key, data]) => {
            const btn = document.createElement('button');
            btn.className = 'scene-btn' + (key === 'sala' ? ' active' : '');
            btn.setAttribute('data-scene', key);
            btn.textContent = data.name;
            btn.onclick = () => loadScene(key);
            sceneSelector.appendChild(btn);
        });

        async function sendCommand(commandText) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: commandText })
                });

                const data = await response.json();
                return data.content;
            } catch (error) {
                console.error('Erro ao enviar comando:', error);
                return '❌ Erro ao conectar com o servidor';
            }
        }

        function showChatBubble(text, type = 'bot') {
            chatBubble.textContent = text;
            chatBubble.style.display = 'block';
            chatBubble.style.borderColor = type === 'bot' ? '#00ffff' : '#ff00ff';
            chatBubble.style.background = type === 'bot'
                ? 'rgba(0, 255, 255, 0.2)'
                : 'rgba(255, 0, 255, 0.2)';

            animateAvatar(type === 'bot' ? avatarBot : avatarUser, 2);

            setTimeout(() => {
                chatBubble.style.display = 'none';
            }, 4000);
        }

        function updateSceneInfo() {
            const scene = scenes[currentScene];
            sceneInfo.innerHTML = `<strong>${scene.name}</strong><br>Pressione espaço para girar câmera`;
        }

        const sceneMap = {
            '!ia': 'sala',
            '!musica': 'estudio',
            '!ranking': 'sala',
            '!perfil': 'sala',
            '!jornal': 'sala',
            '!stats': 'sala',
            '!voz': 'estudio',
            '!sumidos': 'sala'
        };

        async function handleCommand(input) {
            const cmd = input.toLowerCase().trim();
            showChatBubble(input, 'user');

            // Trocar de cena se necessário
            for (const [key, scene] of Object.entries(sceneMap)) {
                if (cmd.startsWith(key) && scene !== currentScene) {
                    loadScene(scene);
                    break;
                }
            }

            // Se for comando de música, mostrar player
            if (cmd.startsWith('!musica')) {
                showMusicPlayer();
            }

            // Enviar comando para API e receber resposta
            const response = await sendCommand(input);
            showChatBubble(response, 'bot');
        }

        sendBtn.addEventListener('click', async () => {
            const input = commandInput.value.trim();
            if (input) {
                await handleCommand(input);
                commandInput.value = '';
            }
        });

        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // ========== MUSIC PLAYER ==========
        const musicPlayer = {
            isPlaying: false,
            toggle() {
                this.isPlaying = !this.isPlaying;
            },
            stop() {
                this.isPlaying = false;
                document.getElementById('musicPlayer').classList.remove('active');
            }
        };
        window.musicPlayer = musicPlayer;

        function showMusicPlayer() {
            document.getElementById('musicPlayer').classList.add('active');
            musicPlayer.isPlaying = true;
        }

        // ========== RESIZE ==========
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ========== ANIMATION LOOP ==========
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // ========== INIT ==========
        loadScene('sala');
        document.getElementById('statusText').textContent = 'Online';
        animate();
    </script>
</body>
</html>
