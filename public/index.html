<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axolotl-Byte 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background: radial-gradient(circle at 50% 30%, #1a1340, #06040f 70%); color: #fff; }
  #canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  .topbar {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px; z-index: 10;
    background: rgba(12,10,30,.6); border: 1px solid rgba(0,255,255,.35);
    padding: 8px 16px; border-radius: 999px; backdrop-filter: blur(12px);
    font-size: 13px; letter-spacing: .5px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #16f06a; box-shadow: 0 0 10px #16f06a; }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px; z-index: 50; background: #06040f;
    transition: opacity .6s ease; text-align: center;
  }
  #loading.hide { opacity: 0; pointer-events: none; }
  .spinner { width: 46px; height: 46px; border: 3px solid rgba(0,255,255,.2); border-top-color: #00ffff; border-radius: 50%; animation: spin .9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading small { color: #8ad; font-size: 12px; }

  #bubble {
    position: fixed; left: 50%; bottom: 150px; transform: translateX(-50%) translateY(10px);
    max-width: min(560px, 86vw); padding: 14px 20px; border-radius: 18px;
    background: rgba(0,255,255,.12); border: 1px solid rgba(0,255,255,.5);
    backdrop-filter: blur(12px); font-size: 15px; line-height: 1.5; white-space: pre-wrap;
    opacity: 0; transition: opacity .3s, transform .3s; z-index: 10; text-align: center;
  }
  #bubble.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #bubble.user { background: rgba(255,0,200,.12); border-color: rgba(255,0,200,.5); }

  .composer {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    display: flex; gap: 10px; width: min(560px, 90vw); z-index: 10;
  }
  .composer input {
    flex: 1; padding: 14px 18px; border-radius: 14px; font-size: 15px;
    background: rgba(12,10,30,.75); border: 1px solid rgba(0,255,255,.4); color: #cffcff;
    backdrop-filter: blur(12px); outline: none;
  }
  .composer input:focus { border-color: #00ffff; box-shadow: 0 0 24px rgba(0,255,255,.35); }
  .composer button {
    padding: 0 22px; border-radius: 14px; font-size: 18px; cursor: pointer;
    background: linear-gradient(135deg, #00ffff, #6a5cff); border: none; color: #021;
    font-weight: 700; transition: transform .15s, box-shadow .15s;
  }
  .composer button:hover { transform: scale(1.05); box-shadow: 0 0 24px rgba(0,255,255,.5); }

  .chips {
    position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%);
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: min(620px,92vw); z-index: 10;
  }
  .chip {
    padding: 7px 14px; border-radius: 999px; font-size: 12px; cursor: pointer;
    background: rgba(106,92,255,.12); border: 1px solid rgba(106,92,255,.45); color: #c9c2ff;
    transition: background .15s, transform .1s;
  }
  .chip:hover { background: rgba(106,92,255,.28); }
  .chip:active { transform: scale(.95); }

  #err { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 60;
         background: #401; color: #f88; border: 1px solid #f44; padding: 10px 16px; border-radius: 10px;
         font: 12px monospace; display: none; max-width: 90vw; white-space: pre-wrap; }
</style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="loading">
    <div class="spinner"></div>
    <div>Carregando avatar 3D…</div>
    <small id="loadMsg">inicializando…</small>
  </div>

  <div class="topbar"><span class="dot"></span> Axolotl-Byte 3D · <span style="color:#7ef">Online</span></div>

  <div id="bubble"></div>
  <div class="chips" id="chips"></div>

  <div class="composer">
    <input id="input" type="text" placeholder="Digite um comando (!ia, !ranking, !musica…)" autocomplete="off">
    <button id="send">▶</button>
  </div>

  <div id="err"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const showErr = (m) => { const e = document.getElementById('err'); e.style.display='block'; e.textContent += m + '\n'; };
    window.addEventListener('error', ev => showErr('JS: ' + ev.message));

    // ===== AVATAR — troque pela URL do SEU avatar do ReadyPlayer.me =====
    // Crie o seu grátis em https://readyplayer.me  → copie o link .glb e cole aqui.
    const AVATAR_URL = 'https://models.readyplayer.me/64bfa15f0e72c63d7c3934a6.glb?morphTargets=ARKit&textureAtlas=1024';

    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x06040f, 0.12);

    const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 3.0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;

    // ===== Iluminação tipo estúdio =====
    scene.add(new THREE.HemisphereLight(0xbcd4ff, 0x202040, 0.7));
    const key = new THREE.DirectionalLight(0xffffff, 2.2); key.position.set(2, 4, 3); scene.add(key);
    const rim = new THREE.DirectionalLight(0x00ffff, 1.6); rim.position.set(-3, 2, -2); scene.add(rim);
    const fill = new THREE.PointLight(0xff00cc, 1.2, 12); fill.position.set(0, 1, 2); scene.add(fill);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(6, 64),
      new THREE.MeshStandardMaterial({ color: 0x0a0820, metalness: .6, roughness: .35 })
    );
    floor.rotation.x = -Math.PI/2; scene.add(floor);
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.7, 0.78, 64),
      new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: .6 })
    );
    ring.rotation.x = -Math.PI/2; ring.position.y = 0.01; scene.add(ring);

    const controls = new OrbitControls(camera, canvas);
    controls.target.set(0, 1.35, 0);
    controls.enablePan = false;
    controls.minDistance = 1.8; controls.maxDistance = 4.5;
    controls.minPolarAngle = Math.PI/3; controls.maxPolarAngle = Math.PI/1.9;
    controls.enableDamping = true; controls.autoRotate = true; controls.autoRotateSpeed = 0.8;
    controls.update();

    let avatar = null, headBone = null, mouthMesh = null, mouthIndex = -1;
    const loadMsg = document.getElementById('loadMsg');
    const loader = new GLTFLoader();
    loader.load(AVATAR_URL, (gltf) => {
      avatar = gltf.scene;
      avatar.traverse(o => {
        if (o.isMesh) { o.frustumCulled = false; }
        if (o.isBone && /head/i.test(o.name)) headBone = o;
        if (o.morphTargetDictionary) {
          for (const k in o.morphTargetDictionary) {
            if (/jawOpen|mouthOpen/i.test(k)) { mouthMesh = o; mouthIndex = o.morphTargetDictionary[k]; }
          }
        }
      });
      scene.add(avatar);
      document.getElementById('loading').classList.add('hide');
      bubble('Olá! 👋 Sou o Axolotl-Byte. Pergunte algo ou use os comandos!', 'bot');
    },
    (p) => { if (p.total) loadMsg.textContent = Math.round(p.loaded/p.total*100) + '%'; },
    (e) => {
      showErr('Avatar .glb não carregou. Usando reserva.');
      buildFallback();
      document.getElementById('loading').classList.add('hide');
      bubble('Olá! 👋 (avatar de reserva)', 'bot');
    });

    function buildFallback() {
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x6a5cff, metalness:.4, roughness:.3 });
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 48, 48), mat); head.position.y = 1.55; g.add(head);
      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.22, 0.55, 8, 24), mat); body.position.y = 1.0; g.add(body);
      avatar = g; scene.add(g);
    }

    let talkUntil = 0;
    function talk(seconds = 2) { talkUntil = performance.now() + seconds*1000; }

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = performance.now();
      const dt = clock.getElapsedTime();
      controls.update();
      if (avatar) avatar.position.y = Math.sin(dt*1.5)*0.01;
      if (t < talkUntil) {
        const open = (Math.sin(t*0.025)*0.5+0.5);
        if (mouthMesh && mouthIndex >= 0) mouthMesh.morphTargetInfluences[mouthIndex] = open;
        if (headBone) headBone.rotation.x = Math.sin(t*0.01)*0.05;
      } else if (mouthMesh && mouthIndex >= 0) {
        mouthMesh.morphTargetInfluences[mouthIndex] *= 0.8;
      }
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    const bubbleEl = document.getElementById('bubble');
    let bubbleTimer;
    function bubble(text, who='bot') {
      clearTimeout(bubbleTimer);
      bubbleEl.textContent = text;
      bubbleEl.className = 'show' + (who==='user' ? ' user' : '');
      if (who==='bot') talk(Math.min(4, 1 + text.length/40));
      bubbleTimer = setTimeout(()=> bubbleEl.classList.remove('show'), 5000);
    }

    const respostas = {
      '!ia': '🧠 Olá! Sou movido a IA. Pergunte qualquer coisa!',
      '!ranking': '🏆 TOP 5\n1° EndriaCarem — 5000 XP\n2° Dev Master — 4500\n3° Code Ninja — 4000\n4° Tech Wizard — 3500\n5° Bot Lover — 3000',
      '!perfil': '👤 Nível 25 · XP 2500 · Rank 12º · 342 mensagens',
      '!jornal': '📰 Hoje: 15 mensagens · 3 enquetes · Top do dia: EndriaCarem (850 XP)',
      '!stats': '📊 24 membros · 12.450 mensagens · uptime 45 dias',
      '!voz': '🎙️ Efeitos: !demonio !esquilo !robo !estadio !agudo !grave',
      '!sumidos': '🚫 João (12d) · Maria (9d) · Pedro (8d)',
      '!musica': '🎵 Tocando agora… 🎶 (player ativado)',
      '!ajuda': '❓ Comandos: !ia !ranking !perfil !jornal !stats !voz !musica !sumidos'
    };
    function responder(txt) {
      const c = txt.toLowerCase().trim();
      for (const k in respostas) if (c.startsWith(k)) return respostas[k];
      if (c.startsWith('!ia ')) return '🤖 ' + txt.slice(4);
      return '❓ Não entendi. Digite !ajuda';
    }

    const input = document.getElementById('input');
    const send = () => {
      const v = input.value.trim(); if (!v) return;
      bubble(v, 'user'); input.value = '';
      setTimeout(()=> bubble(responder(v), 'bot'), 700);
    };
    document.getElementById('send').onclick = send;
    input.addEventListener('keydown', e => { if (e.key==='Enter') send(); });

    const chipsEl = document.getElementById('chips');
    ['!ia Olá','!ranking','!perfil','!jornal','!stats','!voz','!musica','!ajuda'].forEach(c => {
      const b = document.createElement('div'); b.className='chip'; b.textContent=c;
      b.onclick = () => { input.value = c; send(); };
      chipsEl.appendChild(b);
    });
  </script>
</body>
</html>
